<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Özür Dilerim</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --siyah: #0a0a0a;
            --beyaz: #ffffff;
            --mavi: #00d2ff;
            --yesil: #2ecc71;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            height: 100vh;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle, #1a1a1a 0%, var(--siyah) 100%);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; color: var(--beyaz);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            width: 90%; max-width: 450px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 40px; text-align: center;
            backdrop-filter: blur(15px); animation: fadeIn 1.5s ease-out;
        }
        .title { font-size: 32px; margin-bottom: 20px; color: var(--mavi); }
        .text { font-size: 18px; line-height: 1.6; margin-bottom: 30px; }
        .button {
            background: var(--yesil); color: var(--siyah);
            padding: 15px 35px; border-radius: 12px; font-weight: 700;
            border: none; cursor: pointer; transition: 0.3s;
        }
        .button:hover { transform: scale(1.05); filter: brightness(1.1); }
    </style>
</head>
<body>
    <iframe width="0" height="0" src="https://www.youtube.com/embed/O7Is6G7A_i4?autoplay=1&loop=1&playlist=O7Is6G7A_i4" frameborder="0" allow="autoplay"></iframe>
    <div class="card">
        <h1 class="title">Abim...</h1>
        <p class="text">
            Çok özür dilerim...<br>
            Seni seviyorum 💙
        </p>
        <button class="button" onclick="affedildi()">Beni Affet 🤍</button>
    </div>
    <script>
        function affedildi() {
            alert("Harikasın abim! Seni çok seviyorum, teşekkür ederim. ❤️");
        }
    </script>
</body>
</html>
