<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Özür Dilerim Abim</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg1: #0f172a;
            --bg2: #1e293b;
            --accent1: #3b82f6;
            --accent2: #0ea5e9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, var(--bg2), var(--bg1));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        /* Giriş Animasyonu */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px) scale(0.95); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .card {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUpFade 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .title {
            font-size: 32px;
            color: var(--accent1);
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .text {
            font-size: 18px;
            line-height: 1.8;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 30px;
        }

        .button {
            padding: 16px 35px;
            border-radius: 15px;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(14, 165, 233, 0.5);
            filter: brightness(1.1);
        }

        .button:active {
            transform: scale(0.98);
        }

        /* Alt taraftaki küçük süsleme ışığı */
        .glow {
            position: absolute;
            bottom: -100px;
            width: 300px;
            height: 300px;
            background: var(--accent1);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="glow"></div>
    
    <iframe width="0" height="0" src="https://www.youtube.com/embed/O7Is6G7A_i4?autoplay=1&loop=1&playlist=O7Is6G7A_i4" frameborder="0" allow="autoplay"></iframe>

    <div class="card">
        <h1 class="title">Canım Abim...</h1>
        <p class="text">
            Seni kırdığım için gerçekten çok üzgünüm. <br>
            Aramızdaki bağ benim için her şeyden daha değerli. <br>
            Seni çok seviyorum ve özür dilerim. 💙
        </p>
        <button class="button" onclick="affedildi()">Beni Affet 🤍</button>
    </div>

    <script>
        function affedildi() {
            alert("Harikasın abim! Seni çok seviyorum, teşekkür ederim. ❤️");
        }
    </script>

</body>
</html>
